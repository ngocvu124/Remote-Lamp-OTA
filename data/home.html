<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Remote Lamp</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">💡 Remote Lamp</div>
        <nav class="nav-menu">
            <a href="/" class="nav-link active">🖼️ Tạo Hình Nền</a>
            <a href="/files" class="nav-link">🗂️ Quản Lý File</a>
            <a href="https://github.com/ngocvu124/Remote-Lamp-OTA" target="_blank" class="nav-link github-link">💻 GitHub Project</a>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <h2>Thiết Lập Hình Nền (Background)</h2>
            <div id="status">Sẵn sàng</div>
        </header>
        
        <div class="content">
            <div class="upload-card">
                <label class="upload-label">
                    <input type="file" id="fileInput" accept="image/jpeg, image/png">
                    📸 CHỌN ẢNH TỪ MÁY
                </label>
                
                <div style="margin-top: 25px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                    <label style="color: #cbd5e1; font-weight: bold; font-size: 14px;">Lưu file trên thẻ nhớ với tên:</label>
                    <div style="display: flex; justify-content: center; align-items: center; margin-top: 10px;">
                        <input type="text" id="fileNameInput" value="bg1" placeholder="vd: bg1" style="width: 150px; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #fff; text-align: center; font-size: 15px; outline: none; font-weight: bold;">
                        <span style="color: #94a3b8; margin-left: 10px; font-weight: bold;">.bin</span>
                    </div>
                    <p style="font-size: 12px; color: #64748b; margin-top: 10px;">(Tên này sẽ hiện trong Menu Change BG trên màn hình ESP32)</p>
                </div>
            </div>

            <div class="canvas-container">
                <div class="canvas-box">
                    <span class="label-tag">1. Ảnh Gốc Đã Crop</span>
                    <canvas id="canvas" width="240" height="240"></canvas>
                </div>
                <div class="canvas-box">
                    <span class="label-tag">2. Bản Xem Trước</span>
                    <canvas id="binPreview" width="240" height="240"></canvas>
                </div>
            </div>

            <div class="button-group">
                <button id="uploadBtn" class="btn btn-upload" disabled>🚀 TẢI LÊN ESP32</button>
                <button id="dlLocalBtn" class="btn btn-download" disabled>📥 LƯU BIN VỀ PC</button>
            </div>
        </div>

        <footer class="footer">&copy; 2026 Remote Lamp Project by Vũ. All rights reserved.</footer>
    </main>

    <script src="/main.js"></script>
</body>
</html>
