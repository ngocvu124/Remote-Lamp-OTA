<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cấu Hình WiFi</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #222; color: #fff; }
        select, input { padding: 12px; margin: 8px; width: 80%; max-width: 300px; border-radius: 6px; border: none; font-size: 16px; }
        .btn { background: #ff7200; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>CHỌN WIFI NHÀ BÁC</h2>
    <form action="/save">
        <select name="ssid" required>
            {{OPTIONS}}
        </select><br>
        <input type="password" name="pass" placeholder="Mật khẩu WiFi (Nếu có)"><br>
        <input type="submit" class="btn" value="KẾT NỐI NGAY">
    </form>
</body>
</html>
