<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Manager | Remote Lamp</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">💡 Remote Lamp</div>
        <nav class="nav-menu">
            <a href="/" class="nav-link">🖼️ Tạo Hình Nền</a>
            <a href="/files" class="nav-link active">🗂️ Quản Lý File</a>
            <a href="https://github.com/ngocvu124/Remote-Lamp-OTA" target="_blank" class="nav-link github-link">💻 GitHub Project</a>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <div class="breadcrumb" id="breadcrumb">/</div>
            <div id="status">Sẵn sàng</div>
        </header>
        
        <div class="content">
            <div id="storageBarWrap" style="width:100%;max-width:420px;margin:0 auto 24px auto;">
                <div style="font-weight:bold;color:#38bdf8;margin-bottom:6px;">Dung lượng thẻ nhớ SD</div>
                <div style="background:#222;border-radius:8px;border:1px solid #334155;overflow:hidden;height:22px;">
                    <div id="storageBar" style="height:100%;width:0%;background:#38bdf8;transition:width 0.5s;"></div>
                </div>
                <div id="storageText" style="text-align:center;color:#38bdf8;font-size:14px;margin-top:4px;">Đang tải...</div>
            </div>
            <div class="toolbar">
                <button class="btn btn-secondary" onclick="goUp()">⬆️ Lên một cấp</button>
                <button class="btn" onclick="document.getElementById('fileInput').click()">☁️ Tải lên</button>
                <button class="btn" style="background-color: #10b981;" onclick="createFolder()">📂 Tạo Thư Mục</button>
                <input type="file" id="fileInput" onchange="uploadFile()">
            </div>
            
            <div class="file-grid" id="fileList"></div>
        </div>
    </main>

    <script src="/main.js"></script>
</body>
</html>
