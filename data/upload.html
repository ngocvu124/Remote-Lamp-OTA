<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 BG Tool</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 20px; }
        .canvas-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 15px; }
        canvas { border: 2px solid #ff7200; border-radius: 8px; max-width: 100%; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .label-tag { font-size: 12px; margin-bottom: 5px; color: #aaa; text-transform: uppercase; }
        .button-group { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; max-width: 280px; transition: 0.3s; }
        .btn-upload { background: #ff7200; color: #fff; }
        .btn-download { background: #444; color: #00ff00; border: 1px solid #00ff00; }
        .btn-sd { background: #444; color: #00e5ff; border: 1px solid #00e5ff; }
        .btn:disabled { background: #555 !important; color: #888 !important; cursor: not-allowed; border-color: #777 !important; }
        input[type="file"] { display: none; }
        .upload-label { display: inline-block; background: #333; padding: 12px 24px; border-radius: 6px; cursor: pointer; border: 2px dashed #777; margin-bottom: 10px; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h2>CÔNG CỤ HÌNH NỀN ESP32</h2>
    <label class="upload-label">
        <input type="file" id="fileInput" accept="image/jpeg, image/png">
        📸 CHỌN ẢNH TỪ MÁY
    </label>
    <div class="canvas-container">
        <div class="canvas-box">
            <span class="label-tag">1. Ảnh Gốc (Crop)</span>
            <canvas id="canvas" width="240" height="240"></canvas>
        </div>
        <div class="canvas-box">
            <span class="label-tag">2. BIN Preview (Little Endian)</span>
            <canvas id="binPreview" width="240" height="240"></canvas>
        </div>
    </div>
    <div id="status">Sẵn sàng.</div>
    <div class="button-group">
        <button id="uploadBtn" class="btn btn-upload" disabled>🚀 TẢI LÊN MÀN HÌNH (SD)</button>
        <button id="dlLocalBtn" class="btn btn-download" disabled>📥 TẢI BIN MỚI (VỀ PC)</button>
        <button onclick="window.location.href='/download'" class="btn btn-sd">💾 TẢI ẢNH TRÊN THẺ (SD)</button>
    </div>
    <script>
        const fileInput = document.getElementById('fileInput'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'),
              binPreview = document.getElementById('binPreview'), btx = binPreview.getContext('2d'), 
              uploadBtn = document.getElementById('uploadBtn'), dlLocalBtn = document.getElementById('dlLocalBtn'), statusDiv = document.getElementById('status');
        let rgb565Data = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const size = Math.min(img.width, img.height), sx = (img.width - size) / 2, sy = (img.height - size) / 2;
                    ctx.clearRect(0, 0, 240, 240);
                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 240, 240);
                    const imgData = ctx.getImageData(0, 0, 240, 240).data;
                    rgb565Data = new Uint8Array(240 * 240 * 2);
                    let j = 0;
                    for (let i = 0; i < imgData.length; i += 4) {
                        const r = imgData[i] >> 3, g = imgData[i+1] >> 2, b = imgData[i+2] >> 3;
                        const rgb565 = (r << 11) | (g << 5) | b;
                        // Lưu Little Endian: Byte thấp trước, Byte cao sau. Chuẩn bài cho ESP32.
                        rgb565Data[j++] = rgb565 & 0xFF;        // Low byte
                        rgb565Data[j++] = (rgb565 >> 8) & 0xFF; // High byte
                    }
                    renderPreview();
                    uploadBtn.disabled = dlLocalBtn.disabled = false;
                    statusDiv.innerText = 'Đã xử lý xong định dạng Little Endian!';
                    statusDiv.style.color = '#00ff00';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function renderPreview() {
            const imgData = btx.createImageData(240, 240);
            for (let i = 0; i < 240 * 240; i++) {
                // Trình duyệt web đọc ngược lại Little Endian để preview cho bác xem
                const low = rgb565Data[i * 2], high = rgb565Data[i * 2 + 1];
                const val = (high << 8) | low;
                const r = (val >> 11) & 0x1F, g = (val >> 5) & 0x3F, b = val & 0x1F;
                imgData.data[i*4] = (r << 3) | (r >> 2);
                imgData.data[i*4+1] = (g << 2) | (g >> 4);
                imgData.data[i*4+2] = (b << 3) | (b >> 2);
                imgData.data[i*4+3] = 255;
            }
            btx.putImageData(imgData, 0, 0);
        }

        dlLocalBtn.onclick = () => {
            const blob = new Blob([rgb565Data], { type: 'application/octet-stream' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bg.bin'; a.click();
        };

        uploadBtn.onclick = () => {
            uploadBtn.disabled = true; statusDiv.innerText = 'Đang gửi...';
            const formData = new FormData(); 
            formData.append('bg', new Blob([rgb565Data], { type: 'application/octet-stream' }), 'bg.bin');
            fetch('/upload', { method: 'POST', body: formData }).then(res => res.ok ? location.reload() : alert('Lỗi!'));
        };
    </script>
</body>
</html>
