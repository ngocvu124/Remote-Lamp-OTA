<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Hình Nền ESP32</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 20px; }
        .canvas-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 15px; }
        canvas { border: 2px solid #ff7200; border-radius: 8px; max-width: 100%; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .canvas-box { display: flex; flex-direction: column; align-items: center; }
        .label-tag { font-size: 12px; margin-bottom: 5px; color: #aaa; text-transform: uppercase; }
        
        /* Bố cục nút bấm */
        .button-group { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; max-width: 280px; transition: 0.3s; }
        .btn-upload { background: #ff7200; color: #fff; }
        .btn-download { background: #444; color: #00ff00; border: 1px solid #00ff00; }
        .btn-sd { background: #444; color: #00e5ff; border: 1px solid #00e5ff; }
        
        .btn:disabled { background: #555 !important; border-color: #777 !important; color: #888 !important; cursor: not-allowed; }
        input[type="file"] { display: none; }
        .upload-label { display: inline-block; background: #333; color: #fff; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: calc(100% - 48px); max-width: 232px; border: 2px dashed #777; }
        #status { margin-top: 15px; color: #aaa; font-weight: bold; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <h2>CÔNG CỤ HÌNH NỀN ESP32</h2>
    
    <label class="upload-label">
        <input type="file" id="fileInput" accept="image/jpeg, image/png">
        📸 CHỌN ẢNH TỪ MÁY
    </label>

    <div class="canvas-container">
        <div class="canvas-box">
            <span class="label-tag">1. Ảnh Gốc (Square Crop)</span>
            <canvas id="canvas" width="240" height="240"></canvas>
        </div>
        <div class="canvas-box">
            <span class="label-tag">2. BIN Preview (RGB565)</span>
            <canvas id="binPreview" width="240" height="240"></canvas>
        </div>
    </div>

    <div id="status">Sẵn sàng.</div>

    <div class="button-group">
        <button id="uploadBtn" class="btn btn-upload" disabled>🚀 TẢI LÊN MÀN HÌNH (SD)</button>
        
        <button id="dlLocalBtn" class="btn btn-download" disabled>📥 TẢI FILE BIN VỪA TẠO (PC)</button>
        
        <button onclick="downloadFromSD()" class="btn btn-sd">💾 TẢI ẢNH CŨ TRÊN THẺ (SD)</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const binPreview = document.getElementById('binPreview');
        const btx = binPreview.getContext('2d');
        const uploadBtn = document.getElementById('uploadBtn');
        const dlLocalBtn = document.getElementById('dlLocalBtn');
        const statusDiv = document.getElementById('status');
        let rgb565Data = null;

        [ctx, btx].forEach(c => {
            c.fillStyle = '#333';
            c.fillRect(0, 0, 240, 240);
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const size = Math.min(img.width, img.height);
                    const sx = (img.width - size) / 2;
                    const sy = (img.height - size) / 2;

                    ctx.clearRect(0, 0, 240, 240);
                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 240, 240);
                    
                    const imgData = ctx.getImageData(0, 0, 240, 240).data;
                    rgb565Data = new Uint8Array(240 * 240 * 2); 
                    
                    let j = 0;
                    for (let i = 0; i < imgData.length; i += 4) {
                        const r = imgData[i] >> 3;
                        const g = imgData[i+1] >> 2;
                        const b = imgData[i+2] >> 3;
                        const rgb565 = (r << 11) | (g << 5) | b;
                        rgb565Data[j++] = rgb565 & 0xFF;
                        rgb565Data[j++] = (rgb565 >> 8) & 0xFF;
                    }
                    
                    renderBinPreview();
                    uploadBtn.disabled = false;
                    dlLocalBtn.disabled = false;
                    statusDiv.style.color = '#00ff00';
                    statusDiv.innerText = 'Đã chuyển đổi xong! Kiểm tra Preview số 2.';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function renderBinPreview() {
            const imageData = btx.createImageData(240, 240);
            const data = imageData.data;
            for (let i = 0; i < 240 * 240; i++) {
                const low = rgb565Data[i * 2];
                const high = rgb565Data[i * 2 + 1];
                const rgb565 = (high << 8) | low;
                const r = (rgb565 >> 11) & 0x1F;
                const g = (rgb565 >> 5) & 0x3F;
                const b = rgb565 & 0x1F;
                const idx = i * 4;
                data[idx] = (r << 3) | (r >> 2);
                data[idx + 1] = (g << 2) | (g >> 4);
                data[idx + 2] = (b << 3) | (b >> 2);
                data[idx + 3] = 255;
            }
            btx.putImageData(imageData, 0, 0);
        }

        // TẢI FILE BIN VỪA TẠO (Từ trình duyệt xuống PC)
        dlLocalBtn.addEventListener('click', function() {
            if (!rgb565Data) return;
            const blob = new Blob([rgb565Data], { type: 'application/octet-stream' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'new_bg.bin';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            statusDiv.innerText = 'Đã tải file BIN mới xuống máy tính.';
        });

        // TẢI ẢNH CŨ TRÊN THẺ SD (Gọi API từ ESP32)
        function downloadFromSD() {
            statusDiv.style.color = '#00e5ff';
            statusDiv.innerText = 'Đang kéo file từ thẻ nhớ...';
            window.location.href = '/download';
        }

        uploadBtn.addEventListener('click', function() {
            if (!rgb565Data) return;
            uploadBtn.disabled = true;
            statusDiv.style.color = '#ff7200';
            statusDiv.innerText = 'Đang bắn file qua WiFi...';
            const formData = new FormData();
            formData.append('bg', new Blob([rgb565Data]), 'bg.bin');
            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.ok ? (statusDiv.style.color='#00ff00', statusDiv.innerText='XONG! Đang khởi động lại...') : alert('Lỗi tải lên!'))
            .catch(err => { alert('Lỗi: ' + err); uploadBtn.disabled = false; });
        });
    </script>
</body>
</html>
